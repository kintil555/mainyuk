name = "mainyuk"
main = "worker.js"
compatibility_date = "2024-01-01"

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[durable_objects.bindings]]
name = "QUEUE_MANAGER"
class_name = "QueueManager"

[[durable_objects.bindings]]
name = "ROOM_REGISTRY"
class_name = "RoomRegistry"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["QueueManager"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["RoomRegistry"]
